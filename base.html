<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Student App{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 800px;
            margin: auto;
        }

        a {
            text-decoration: none;
            color: blue;
            margin-right: 10px;
        }

        input, button {
            padding: 8px;
            margin: 5px 0;
        }

        button {
            cursor: pointer;
        }

        nav {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/analytics">Analytics</a>
        <a href="/report">Report</a>
        <a href="/logout">Logout</a>
    </nav>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
