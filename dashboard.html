<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>
    <h2>Dashboard</h2>

    <form method="POST" action="/add_subject">
        <input type="text" name="name" placeholder="Add Subject" required>
        <button type="submit">Add</button>
    </form>

    <h3>Your Subjects</h3>

    <ul>
        {% for s in subjects %}
        <li>
            {{ s.name }}
            <a href="/delete_subject/{{ s.id }}">Delete</a>
            <a href="/subject/{{ s.id }}">View</a>
        </li>
        {% endfor %}
    </ul>

    <br>

    <a href="/analytics">Analytics</a> |
    <a href="/report">Report</a> |
    <a href="/logout">Logout</a>
</body>
</html>
